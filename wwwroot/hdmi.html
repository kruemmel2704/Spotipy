<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotipy TV Display</title>
    <!-- SignalR Client Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/hdmi.css">
</head>
<body>
    <!-- Fullscreen ambient blurred background -->
    <div class="ambient-background" id="ambient-bg"></div>
    <div class="dark-overlay"></div>

    <div class="kiosk-container">
        <!-- Left Column: Album Art Display -->
        <div class="cover-art-section">
            <div class="cover-glow-outer">
                <div class="cover-glow-shadow" id="cover-glow"></div>
                <img src="/img/default_cover.png" alt="Album Art" id="album-cover" class="kiosk-cover">
            </div>
        </div>

        <!-- Right Column: Metadata & Status -->
        <div class="metadata-section">
            <div class="top-row">
                <!-- Connect Status / App Logo -->
                <div class="brand">
                    <span class="brand-logo">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.893-.982-.336.075-.668-.135-.744-.47-.077-.337.135-.668.47-.745 3.856-.88 7.15-.506 9.82.13.295.178.387.563.207.86zm1.224-2.72c-.227.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.075-1.183-.413.125-.847-.107-.972-.52-.125-.413.107-.847.52-.972 3.667-1.112 8.243-.573 11.34 1.333.367.226.488.707.26 1.074zm.107-2.82c-3.26-1.937-8.644-2.115-11.758-1.17-.5.152-1.025-.133-1.177-.633-.15-.5.133-1.027.633-1.178 3.593-1.09 9.53-.888 13.28 1.34.45.267.6.845.333 1.295-.266.45-.845.6-1.295.333z"/></svg>
                    </span>
                    <span class="brand-name">Spotipy Connect</span>
                </div>

                <!-- Jam session info -->
                <div id="jam-indicator" class="jam-tag" style="display: none;">
                    <span class="jam-pulse"></span> Spotify Jam Aktiv
                </div>
            </div>

            <!-- Song Info -->
            <div class="song-details">
                <h1 id="track-title" class="track-title">Warte auf Verbindung...</h1>
                <h2 id="track-artist" class="track-artist">Spotify Connect bereit</h2>
                <h3 id="track-album" class="track-album"></h3>
            </div>

            <!-- Progress Bar Info -->
            <div class="progress-container">
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="time-row">
                    <span id="time-current">00:00</span>
                    <span id="time-duration">00:00</span>
                </div>
            </div>

            <!-- Footer: QR Code & LAN sharing instructions -->
            <div class="lan-share-panel glass-panel">
                <div class="share-text">
                    <p class="share-title">Song hinzufügen & steuern</p>
                    <p class="share-desc">Scanne den QR Code oder öffne im Browser:</p>
                    <p id="share-url" class="share-url"></p>
                </div>
                <div class="share-qr-container">
                    <img id="share-qr-image" src="" alt="Control QR">
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/shared.js"></script>
    <script src="/js/hdmi.js"></script>
</body>
</html>
